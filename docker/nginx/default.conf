# ═══════════════════════════════════════════════════════════════════════════════
# IDC Platform — Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════════════

# ── Gzip compression for text content ─────────────────────────────────────────
gzip on;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml text/javascript image/svg+xml;
gzip_min_length 256;
gzip_vary on;

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # ── SPA fallback (Vue Router history mode) ──────────────────────────────
    #   Any non-file, non-asset URL serves index.html so Vue Router can
    #   resolve the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ───────────────────────────────────────────────────
    #   Forward all /api/* requests to the backend container
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host                   $host;
        proxy_set_header X-Real-IP              $remote_addr;
        proxy_set_header X-Forwarded-For        $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto      $scheme;
    }

    # ── WebSocket proxy ─────────────────────────────────────────────────────
    #   Long-lived connections need extended timeouts and upgrade headers
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade                 $http_upgrade;
        proxy_set_header Connection              "upgrade";
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Forwarded-For         $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto       $scheme;

        # Long-lived WebSocket connections (24h)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Static assets with long-term caching ────────────────────────────────
    #   Fingerprinted files in /assets/ are safe to cache indefinitely
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Deny access to hidden files (dotfiles) ──────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
